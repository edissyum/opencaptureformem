name: Deployement OpenCaptureformem
on:
  push:
    branches: [ dev_cicd ]
  #pull_request:
    #branches: [ master ]

jobs:

  test-self-hosted:
    name: Test d'exécuteurs auto-hebergés
    runs-on: self-hosted
    defaults:
        run:
          working-directory: /

    steps: 
      - name: System info
        run: lsb_release -a

      - name: Checkout source code
        uses: actions/checkout@v2

      #- name: Set up Python 3.7
        #uses: actions/setup-python@v2
        #with:
          #python-version: 3.11.0
      - name: Set up Python
        run: |
          sudo apt install -y python3
          sudo apt install -y python3-pip
        continue-on-error: true

      - name: Creation de repertoires
        run: |
          sudo mkdir -p /opt/edissyum/ 
          sudo chmod -R 775 /opt/edissyum/
          sudo chown -R $(whoami):$(whoami) /opt/edissyum/
    
      - name: Récupération du dernier tag
        run: |
          sudo apt install -y git crudini
          git clone -b dev_v4 https://github.com/edissyum/opencaptureformem /opt/edissyum/opencaptureformem/

      - name: Lancement de l'installation
        run: |
          cd /opt/edissyum/opencaptureformem/install/
          chmod u+x install.sh
          sed -i 's/$(tput bold)/""/gI' install.sh
          sed -i 's/$(tput sgr0)/""/gI' install.sh
          sed -i 's/^user=$(who.*/user=$(whoami)/gI' install.sh
          sed -i 's/^group=$(who.*/user=$(whoami)/gI' install.sh
          sudo ./install.sh --user $(whoami) --supervisor_systemd systemd --secure_rabbit no
      
      - name: Test du service OC-Worker
        run: |
          sudo systemctl status oc-worker.service
        continue-on-error: true